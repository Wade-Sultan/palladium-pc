steps:
  # ---- Deploy to Compute Engine via SSH ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute ssh palladium-admin \
          --zone=us-central1-a \
          --tunnel-through-iap \
          --command='
            cd ~/palladium/admin && \
            git pull origin main && \
            export MIX_ENV=prod && \
            export DATABASE_URL="ecto://palladium_app:$(gcloud secrets versions access latest --secret=palladium-db-password-prod)@localhost:5432/palladium" && \
            export SECRET_KEY_BASE=$(gcloud secrets versions access latest --secret=palladium-admin-secret-key) && \
            mix deps.get --only prod && \
            mix compile && \
            mix assets.deploy && \
            mix release --overwrite && \
            sudo systemctl restart palladium-admin
          '
 
options:
  logging: CLOUD_LOGGING_ONLY
 